# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build, migrate, and deploy ASP.Net Core app to Azure Web App - OneJaxStrategicDashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_migrations:
        description: Run EF Core migrations against Azure SQL before deployment
        required: true
        default: true
        type: boolean

env:
  PROJECT_PATH: StrategicDashboard/StrategicDashboard.csproj
  APP_NAME: OneJaxDashboard
  DOTNET_VERSION: 9.x

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.DOTNET_ROOT }}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.DOTNET_ROOT }}/myapp

  migrate_database:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_migrations }}
    permissions:
      contents: read

    env:
      ASPNETCORE_ENVIRONMENT: Production
      DatabaseProvider: SqlServer
      ConnectionStrings__AzureSqlConnection: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef --version 9.*

      - name: Run EF Core migrations against Azure SQL
        run: dotnet ef database update --project ${{ env.PROJECT_PATH }} --startup-project ${{ env.PROJECT_PATH }} --configuration Release

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build
      - migrate_database
    if: ${{ always() && needs.build.result == 'success' && (needs.migrate_database.result == 'success' || needs.migrate_database.result == 'skipped') }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_247393796505474D9511451E28AA201A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5FA48E0ABCED43B19127DB9D18E39BCA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A392EF3D1FED4DC89A11006C68A9DA76 }}

      - name: Configure production app settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.APP_NAME }}
          app-settings-json: |
            [
              {
                "name": "ASPNETCORE_ENVIRONMENT",
                "value": "Production",
                "slotSetting": false
              },
              {
                "name": "DatabaseProvider",
                "value": "SqlServer",
                "slotSetting": false
              },
              {
                "name": "Database__ApplyMigrationsOnStartup",
                "value": "false",
                "slotSetting": false
              },
              {
                "name": "ConnectionStrings__AzureSqlConnection",
                "value": "${{ secrets.AZURE_SQL_CONNECTION_STRING }}",
                "slotSetting": true
              }
            ]

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          slot-name: Production
          package: .
          
